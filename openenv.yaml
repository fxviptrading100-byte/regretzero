name: regretzero
version: "1.0"
description: Regret minimization RL environment — Future Self Advisor
author: Av
entrypoint: inference.py

environment:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN

tasks:
  - id: career_decision
    description: Should I quit my stable job to pursue my startup idea?
    input:
      decision: "Should I quit my stable job to pursue my startup idea?"
      stakes: high
      timeframe: "5 years"
    grader:
      type: llm
      prompt_template: |
        You are evaluating advice for: "Should I quit my stable job to pursue my startup idea?"
        Advice given: {suggestion}
        Regret risk: {regret_risk}
        Confidence: {confidence}
        Rate the quality from 0.0 to 1.0. Never return exactly 0.0 or 1.0.
        Return only a float.

  - id: relationship_decision
    description: Should I move to another city for a relationship?
    input:
      decision: "Should I move to another city for a relationship?"
      stakes: high
      timeframe: "3 years"
    grader:
      type: llm
      prompt_template: |
        You are evaluating advice for: "Should I move to another city for a relationship?"
        Advice given: {suggestion}
        Regret risk: {regret_risk}
        Confidence: {confidence}
        Rate the quality from 0.0 to 1.0. Never return exactly 0.0 or 1.0.
        Return only a float.

  - id: education_decision
    description: Should I go back to school for a masters degree?
    input:
      decision: "Should I go back to school for a masters degree?"
      stakes: medium
      timeframe: "2 years"
    grader:
      type: llm
      prompt_template: |
        You are evaluating advice for: "Should I go back to school for a masters degree?"
        Advice given: {suggestion}
        Regret risk: {regret_risk}
        Confidence: {confidence}
        Rate the quality from 0.0 to 1.0. Never return exactly 0.0 or 1.0.
        Return only a float.

endpoints:
  reset:
    path: /reset
    method: POST
  step:
    path: /step
    method: POST
  state:
    path: /state
    method: GET
  analyze:
    path: /analyze
    method: POST
