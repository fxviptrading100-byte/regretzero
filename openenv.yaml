# RegretZero Environment Configuration
# Required for hackathon judging compliance

# OpenAI Configuration
API_BASE_URL: "https://api.openai.com/v1"
MODEL_NAME: "gpt-3.5-turbo"
HF_TOKEN: "your_hf_token_here"

# RegretZero Configuration
MAX_DECISION_LENGTH: 1000
ANALYSIS_TIMEOUT: 30
LOG_LEVEL: "INFO"

# Server Configuration
HOST: "0.0.0.0"
PORT: 8000
WORKERS: 1

# Model Configuration
MODEL_PATH: "model/regret_ppo.pt"
OBSERVATION_DIM: 64
ACTION_DIM: 8
HIDDEN_DIM: 128

# Training Configuration
LEARNING_RATE: 0.0003
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPSILON: 0.2
VALUE_COEF: 0.5
ENTROPY_COEF: 0.01
MAX_GRAD_NORM: 0.5

# Demo Configuration
DEFAULT_MODEL_SOURCE: "local"
CONFIDENCE_THRESHOLD: 0.5
UNCERTAINTY_THRESHOLD: 0.5
